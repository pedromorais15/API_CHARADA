<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Enigma Brutal | Normal & Game</title>
    <style>
        .neo-brutal-shadow { box-shadow: 8px 8px 0px 0px rgba(0,0,0,1); }
        .neo-brutal-shadow-sm { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body id="main-body" class="bg-[#FFD100] flex flex-col items-center py-10 min-h-screen font-black text-black transition-colors duration-500">

    <nav class="flex gap-4 mb-10">
        <button id="nav-normal" class="bg-white border-4 border-black px-6 py-2 uppercase neo-brutal-shadow-sm active:shadow-none transition-all">Modo Normal</button>
        <button id="nav-game" class="bg-[#3B82F6] text-white border-4 border-black px-6 py-2 uppercase neo-brutal-shadow-sm active:shadow-none transition-all">Modo Game 🎮</button>
    </nav>

    <main id="view-normal" class="flex flex-col items-center w-full">
        <h1 class="text-4xl uppercase border-4 border-black bg-white p-4 neo-brutal-shadow mb-12 transform -rotate-1">
            Charada Livre
        </h1>

        <div class="perspective-1000 w-full max-w-sm h-72 cursor-pointer mb-10">
            <div id="card-inner" class="relative w-full h-full transition-transform duration-500 preserve-3d border-4 border-black bg-white neo-brutal-shadow">
                <div class="absolute inset-0 backface-hidden flex flex-col items-center justify-center p-8 bg-[#3B82F6] text-white">
                    <span class="bg-black text-white px-3 py-1 mb-6 text-sm uppercase border-2 border-black">Pergunta</span>
                    <p id="pergunta" class="text-2xl text-center leading-none">Carregando...</p>
                </div>
                <div class="absolute inset-0 backface-hidden rotate-y-180 flex flex-col items-center justify-center p-8 bg-black text-white border-2 border-white">
                    <span class="bg-[#3B82F6] text-white px-3 py-1 mb-6 text-sm uppercase border-2 border-white">Resposta</span>
                    <p id="resposta" class="text-3xl text-center leading-none text-[#FFD100]"></p>
                </div>
            </div>
        </div>

        <button id="btn-nova" class="bg-white border-4 border-black px-12 py-5 text-2xl uppercase neo-brutal-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all">
            Próxima 🎲
        </button>
    </main>

    <main id="view-game" class="hidden flex flex-col items-center w-full max-w-sm px-4">
        <div class="bg-[#22c55e] border-4 border-black p-4 neo-brutal-shadow-sm w-full mb-8 flex justify-between items-center">
            <span class="uppercase text-xl">Score:</span>
            <span id="placar" class="text-3xl">0</span>
        </div>

        <div class="bg-white border-4 border-black p-6 w-full neo-brutal-shadow mb-8 min-h-[200px] flex flex-col justify-center">
            <span class="bg-black text-white px-2 py-1 text-[10px] uppercase w-fit mb-4">Desafio Mental</span>
            <p id="pergunta-game" class="text-2xl leading-tight mb-6">Qual é o bicho...</p>
            
            <input type="text" id="input-resposta" placeholder="DIGITE AQUI..." 
                   class="w-full border-4 border-black p-4 text-xl uppercase focus:bg-[#3B82F6] focus:text-white outline-none neo-brutal-shadow-sm transition-all">
        </div>

        <div class="flex gap-4 w-full">
            <button id="btn-chutar" class="flex-1 bg-[#3B82F6] text-white border-4 border-black py-4 uppercase text-xl neo-brutal-shadow active:shadow-none transition-all">
                Chutar!
            </button>
            <button id="btn-pular" class="bg-white border-4 border-black px-6 py-4 uppercase neo-brutal-shadow-sm active:shadow-none transition-all">
                Pular
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
