<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gerador de Charadas</title>
    <style>
        /* Sombra sólida característica do Neo-Brutalismo */
        .neo-brutal-shadow {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
        .neo-brutal-shadow-sm {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        /* Utilitários para o efeito de flip */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-[#FFD100] flex flex-col items-center justify-center min-h-screen p-4 font-black">

    <h1 class="text-4xl md:text-6xl mb-16 uppercase tracking-tight border-4 border-black bg-white p-4 neo-brutal-shadow transform -rotate-1">
        Charadas
    </h1>

    <div class="perspective-1000 w-full max-w-sm h-72 cursor-pointer">
        <div id="card-inner" class="relative w-full h-full transition-transform duration-500 preserve-3d border-4 border-black bg-white neo-brutal-shadow">
            
            <div class="absolute inset-0 backface-hidden flex flex-col items-center justify-center p-8 bg-[#3B82F6] text-white">
                <span class="bg-black text-white px-3 py-1 mb-6 text-sm uppercase tracking-widest border-2 border-black">Pergunta</span>
                <p id="pergunta" class="text-2xl text-center leading-none">Carregando...</p>
                <p class="mt-10 text-[10px] uppercase bg-white text-black px-2 border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Clique para revelar</p>
            </div>

            <div class="absolute inset-0 backface-hidden rotate-y-180 flex flex-col items-center justify-center p-8 bg-black text-white border-2 border-white">
                <span class="bg-[#3B82F6] text-white px-3 py-1 mb-6 text-sm uppercase tracking-widest border-2 border-white">Resposta</span>
                <p id="resposta" class="text-3xl text-center leading-none text-[#FFD100]"></p>
                <p class="mt-10 text-[10px] uppercase text-gray-400">Clique para voltar</p>
            </div>

        </div>
    </div>

    <button id="btn-nova" class="mt-12 bg-white border-4 border-black px-10 py-5 text-2xl uppercase tracking-tighter hover:bg-[#3B82F6] hover:text-white transition-all neo-brutal-shadow active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
        Nova Charada 🎲
    </button>

    <script src="script.js"></script>
</body>
</html>
